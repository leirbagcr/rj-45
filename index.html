<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>

    <script>
        function pesquisar(cep) {
            cep = cep.replace(/\D/g, '');
            
            const resposta = document.getElementById("cepErro");
            resposta.textContent = "";
    
            if (cep.length === 0) {
                document.getElementById("rua").value = "";
                document.getElementById("bairro").value = "";
                document.getElementById("cidade").value = "";
                document.getElementById("estado").value = "";
                return;
            }
    
            var validacep = /^[0-9]{8}$/;
    
            if (validacep.test(cep)) {
                const link = 'https://viacep.com.br/ws/' + cep + '/json/?callback=preencherEndereco';
                var script = document.createElement("script");
                script.src = link;
                document.body.appendChild(script);
            }
        }
    
        function preencherEndereco(conteudo) {
            const resposta = document.getElementById("cepErro");
            
            if (!("erro" in conteudo)) {
                document.getElementById("rua").value = conteudo.logradouro;
                document.getElementById("cidade").value = conteudo.localidade;
                document.getElementById("bairro").value = conteudo.bairro;
                document.getElementById("estado").value = conteudo.uf;
            } else {
                resposta.textContent = "O CEP digitado não existe!!";
                document.getElementById("cep").value = "";
            }
        }
    </script>
</head>
<body>
    <main>
        <h1>Cadastro de Clientes</h1>
    <form>
        <input type="text" id="nome" required>
        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" placeholder="000.000.000-00" required>
        <label for="email">E-mail:</label>
        <input type="email" id="email" required>
        <label for="celular">Celular:</label>
        <input type="tel" id="celular" placeholder="(99) 99999-9999" required>
        <label for="senha">Senha:</label>
        <input type="password" id="senha" required>
        <label for="cep">CEP:</label>
        <input type="text" id="cep" placeholder="00000-000" required oninput="pesquisar(this.value)">
        <span id="cepErro" class="error-message"></span>
        <label for="rua">Rua:</label>
        <input type="text" id="rua" required>
        <label for="numero_casa" >Numero da Casa:</label>
        <input type="text" id="numero_casa" required>
        <label for="bairro">Bairro:</label>
        <input type="text" id="bairro" required>
        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" required>
        <label for="estado">Estado:</label>
        <input type="text" id="estado" required>
        <label for="dt_nasc">Data de Nascimento:</label>
        <input type="text" id="dt_nasc" required>

        <input type="submit" value="Enviar Cadastro">
        </form>
    </main>
</body>
</html>
